<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>List2Me</title>
  <script>
    // GitHub Pages SPA routing: redirect to index with path encoded as query param
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      '/?/' +
      l.pathname.slice(1).replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
