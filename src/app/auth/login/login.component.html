<div class="auth-wrapper">
  <div class="auth-brand">
    <nb-icon icon="layers-outline" class="brand-icon"></nb-icon>
    <span class="brand-name">List2Me</span>
    <p class="brand-tagline">Organizza il tuo mondo, condividilo con chi ami.</p>
  </div>

  <div class="auth-panel">
    <div class="auth-box">
      <h2 class="auth-title">Bentornato</h2>
      <p class="auth-subtitle">Inserisci le tue credenziali per accedere.</p>

      @if (error()) {
        <nb-alert status="danger" closable (close)="error.set('')" class="auth-alert">
          {{ error() }}
        </nb-alert>
      }

      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="form-group">
          <label class="label" for="email">Email</label>
          <div class="input-wrap">
            <nb-icon icon="email-outline" pack="eva" class="input-icon"></nb-icon>
            <input nbInput fullWidth id="email" formControlName="email"
                   class="has-icon" placeholder="la-tua@email.com"
                   autocomplete="email" type="email" />
          </div>
        </div>

        <div class="form-group">
          <label class="label" for="password">Password</label>
          <div class="input-wrap">
            <nb-icon icon="lock-outline" pack="eva" class="input-icon"></nb-icon>
            <input nbInput fullWidth id="password" formControlName="password"
                   class="has-icon has-suffix" [type]="getInputType()"
                   placeholder="La tua password" autocomplete="current-password" />
            <button type="button" class="toggle-btn" (click)="togglePassword()" tabindex="-1">
              <nb-icon [icon]="showPassword() ? 'eye-outline' : 'eye-off-outline'" pack="eva"></nb-icon>
            </button>
          </div>
        </div>

        <button nbButton fullWidth status="primary" type="submit"
                [disabled]="form.invalid || loading()" class="submit-btn">
          @if (loading()) {
            <nb-spinner size="small" status="basic"></nb-spinner>
          } @else {
            Accedi
          }
        </button>
      </form>

      <div class="auth-divider">
        <span>oppure</span>
      </div>

      <button class="google-btn" type="button" (click)="loginWithGoogle()" [disabled]="loading()">
        <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Accedi con Google
      </button>

      <p class="auth-footer-text">
        Non hai un account? <a routerLink="/auth/register">Registrati</a>
      </p>
    </div>
  </div>
</div>
