<nb-layout>
  <nb-layout-header fixed>
    <div class="header-container">
      <div class="header-left">
        <button nbButton ghost (click)="toggleSidebar()" class="sidebar-toggle" aria-label="Apri/chiudi menu">
          <nb-icon icon="menu-2-outline"></nb-icon>
        </button>
        <a routerLink="/pages/dashboard" class="logo">
          <span class="logo-mark">
            <nb-icon icon="layers-outline" class="logo-icon"></nb-icon>
          </span>
          <span class="logo-text">List2Me</span>
        </a>
      </div>

      <div class="header-right">
        <button
          nbButton
          ghost
          class="theme-toggle"
          [attr.aria-label]="theme() === 'dark' ? 'Passa al tema chiaro' : 'Passa al tema scuro'"
          [title]="theme() === 'dark' ? 'Tema chiaro' : 'Tema scuro'"
          (click)="toggleTheme()"
        >
          <nb-icon [icon]="theme() === 'dark' ? 'sun-outline' : 'moon-outline'"></nb-icon>
        </button>
        @if (currentUser()) {
          <div class="user-chip">
            <nb-user
              [name]="userFullName()"
              [picture]="currentUser()?.avatar_url || ''"
              [nbContextMenu]="userMenuItems"
              nbContextMenuTag="user-context-menu"
              nbContextMenuTrigger="click"
            ></nb-user>
            <nb-icon icon="chevron-down-outline" class="user-chip-caret"></nb-icon>
          </div>
        }
      </div>
    </div>
  </nb-layout-header>

  <nb-sidebar tag="left" responsive>
    <nb-menu [items]="menuItems" tag="main-menu"></nb-menu>
  </nb-sidebar>

  <nb-layout-column>
    <router-outlet></router-outlet>
  </nb-layout-column>

  <nb-layout-footer>
    <span class="footer-text">
      &copy; {{ currentYear }} List2Me — Organizza il tuo mondo, condividilo con chi ami.
    </span>
  </nb-layout-footer>
</nb-layout>
