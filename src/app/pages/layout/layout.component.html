<div class="shell" [class.sidebar-open]="sidebarOpen()">
  <header class="shell-header">
    <div class="header-left">
      <button class="icon-btn sidebar-toggle" (click)="toggleSidebar()" aria-label="Apri/chiudi menu">
        <tui-icon icon="@tui.menu"></tui-icon>
      </button>
      <a routerLink="/pages/dashboard" class="logo">
        <span class="logo-mark">
          <tui-icon icon="@tui.layers" class="logo-icon"></tui-icon>
        </span>
        <span class="logo-text">List2Me</span>
      </a>
    </div>

    <div class="header-right">
      <button
        class="icon-btn theme-toggle"
        [attr.aria-label]="theme() === 'dark' ? 'Passa al tema chiaro' : 'Passa al tema scuro'"
        [title]="theme() === 'dark' ? 'Tema chiaro' : 'Tema scuro'"
        (click)="toggleTheme()"
      >
        <tui-icon [icon]="theme() === 'dark' ? '@tui.sun' : '@tui.moon'"></tui-icon>
      </button>

      @if (currentUser()) {
        <div class="user-menu" (click)="$event.stopPropagation()">
          <button class="user-menu-trigger" (click)="toggleUserMenu()">
            <app-user-chip [name]="userFullName()" [picture]="currentUser()?.avatar_url || null" size="s"></app-user-chip>
            <tui-icon icon="@tui.chevron-down" class="user-chip-caret"></tui-icon>
          </button>
          @if (userMenuOpen()) {
            <div class="user-dropdown">
              <a routerLink="/pages/profile" class="user-dropdown-item" (click)="userMenuOpen.set(false)">
                <tui-icon icon="@tui.user"></tui-icon>
                Profilo
              </a>
              <button type="button" class="user-dropdown-item" (click)="logout()">
                <tui-icon icon="@tui.log-out"></tui-icon>
                Esci
              </button>
            </div>
          }
        </div>
      }
    </div>
  </header>

  @if (sidebarOpen()) {
    <div class="shell-backdrop" (click)="toggleSidebar()"></div>
  }

  <aside class="shell-sidebar">
    <nav class="shell-nav">
      @for (item of navItems; track item.link) {
        <a class="nav-item" [routerLink]="item.link" routerLinkActive="active" (click)="closeSidebarOnMobile()">
          <tui-icon [icon]="item.icon" class="nav-item-icon"></tui-icon>
          <span>{{ item.title }}</span>
        </a>
      }
    </nav>
  </aside>

  <main class="shell-main">
    <div class="shell-content">
      <router-outlet></router-outlet>
    </div>
    <footer class="shell-footer">
      <span class="footer-text">
        &copy; {{ currentYear }} List2Me — Organizza il tuo mondo, condividilo con chi ami.
      </span>
    </footer>
  </main>
</div>
