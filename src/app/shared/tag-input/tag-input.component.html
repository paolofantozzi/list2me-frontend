<div class="tag-chips">
  @for (tag of tags; track tag) {
    <span class="tag-chip">
      {{ tag }}
      <button type="button" class="tag-chip-remove" (click)="removeTag(tag)" aria-label="Rimuovi tag">
        <tui-icon icon="@tui.x"></tui-icon>
      </button>
    </span>
  }
  <input
    type="text"
    class="tag-input-field"
    #tagField
    placeholder="Aggiungi tag e premi invio..."
    (input)="onQueryChange(tagField.value)"
    (keydown.enter)="$event.preventDefault(); addTagFromInput(tagField)"
  />
</div>
@if (suggestions().length) {
  <div class="tag-suggestions">
    @for (s of suggestions(); track s.id) {
      <button type="button" class="tag-suggestion" (click)="addTag(s.name)">{{ s.name }}</button>
    }
  </div>
}
