<div class="confirm-dialog">
  <h3 class="confirm-dialog-title">{{ title }}</h3>
  <p class="confirm-dialog-message">{{ message }}</p>
  <div class="confirm-dialog-actions">
    <button tuiButton appearance="flat" size="m" (click)="cancel()">{{ cancelLabel }}</button>
    <button tuiButton appearance="primary" size="m" [class.l2m-btn-danger-solid]="danger" (click)="confirm()">
      {{ confirmLabel }}
    </button>
  </div>
</div>
