<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>List2Me</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="List2Me — Social list management app">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="nb-theme-default">
  <script>
    // Anti-FOUC: applica il tema salvato prima che Angular esegua il bootstrap.
    (function() {
      if (localStorage.getItem('list2me_theme') === 'dark') {
        document.body.className = 'nb-theme-dark';
      }
    })();
  </script>
  <app-root></app-root>
</body>
</html>
